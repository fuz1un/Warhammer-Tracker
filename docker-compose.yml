version: '3.9'

services:
  wh-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wh-tracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./watcher/config.json:/app/config.json:ro
      - ./watcher/data:/app/data
    # Alternativa ao config.json: define aqui as variáveis de ambiente
    # environment:
    #   EMAIL_ENABLED: "true"
    #   EMAIL_USER: "exemplo@gmail.com"
    #   EMAIL_PASS: "xxxx xxxx xxxx xxxx"
    #   EMAIL_TO: "destino@email.com"
    #   DISCORD_ENABLED: "true"
    #   DISCORD_WEBHOOK: "https://discord.com/api/webhooks/..."
    #   INTERVAL_WATCHED: "2"
      #   INTERVAL_PREORDER: "10"
      #   DATA_FILE: "/app/data/state.json"
